version: '3.8'

# OpenClaw 多实例 Docker Compose 配置
# 每个实例完全独立，包含独立的配置、数据和端口

services:
  # ============================================
  # 实例 1: 管家龙虾 (lobster-001)
  # 角色: 管家 - 高效干练，简洁直接
  # ============================================
  openclaw-lobster-001:
    container_name: openclaw-lobster-001
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    ports:
      - "${LOBSTER_001_PORT:-18001}:18789"
    volumes:
      # 实例独立配置
      - ./instances/lobster-001/config:/home/node/.openclaw
      # 实例独立工作空间
      - ./instances/lobster-001/workspace:/home/node/.openclaw/workspace
      # 实例数据持久化
      - ./instances/lobster-001/data:/home/node/.openclaw/data
      # 共享扩展（可选）
      - ./shared/extensions:/home/node/.openclaw/extensions:ro
    environment:
      # 实例标识
      - OPENCLAW_INSTANCE_ID=lobster-001
      - OPENCLAW_INSTANCE_NAME=${LOBSTER_001_NAME:-大管家}
      - OPENCLAW_INSTANCE_ROLE=${LOBSTER_001_ROLE:-管家}
      # 基础配置
      - NODE_ENV=production
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/home/node/.openclaw/workspace
      # API Keys（从 .env 读取）
      - MOONSHOT_API_KEY=${LOBSTER_001_MOONSHOT_API_KEY:-}
      - OPENAI_API_KEY=${LOBSTER_001_OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${LOBSTER_001_ANTHROPIC_API_KEY:-}
      # Channel 配置
      - FEISHU_APP_ID=${LOBSTER_001_FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${LOBSTER_001_FEISHU_APP_SECRET:-}
      - TELEGRAM_BOT_TOKEN=${LOBSTER_001_TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${LOBSTER_001_DISCORD_BOT_TOKEN:-}
      # 网关配置
      - GATEWAY_BIND=lan
      - GATEWAY_PORT=18789
    networks:
      - openclaw-lobster-001-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  openclaw-cli-lobster-001:
    container_name: openclaw-cli-lobster-001
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    network_mode: "service:openclaw-lobster-001"
    volumes:
      - ./instances/lobster-001/config:/home/node/.openclaw
      - ./instances/lobster-001/workspace:/home/node/.openclaw/workspace
      - ./instances/lobster-001/data:/home/node/.openclaw/data
    environment:
      - OPENCLAW_INSTANCE_ID=lobster-001
      - NODE_ENV=production
    profiles:
      - cli-001
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN

  # ============================================
